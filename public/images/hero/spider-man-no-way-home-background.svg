<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 920" role="img" aria-labelledby="title desc">
  <title id="title">Dark cinematic Spider-Man fallback background</title>
  <desc id="desc">A restrained dark red and blue cinematic fallback background used only when no real movie image is available.</desc>
  <defs>
    <linearGradient id="base" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07090d"/>
      <stop offset=".42" stop-color="#121823"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <radialGradient id="red" cx="28%" cy="42%" r="38%">
